<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <h2>Cadastro</h2>

    <form id="form" novalidate>

      <div class="field">
        <label for="nome">Nome</label>
        <input id="nome" name="nome" type="text" required minlength="3">
        <span id="nome-error" class="error"></span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
        <span id="email-error" class="error"></span>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" required minlength="6">
        <div class="strength"><div id="barra"></div></div>
        <span id="senha-error" class="error"></span>
      </div>

      <div class="field">
        <label for="confirmar">Confirmar Senha</label>
        <input id="confirmar" name="confirmar" type="password" required>
        <span id="confirmar-error" class="error"></span>
      </div>

      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h3>🎉 Cadastro realizado!</h3>
      <p>Seus dados foram enviados com sucesso.</p>
      <button onclick="fecharModal()">OK</button>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
